spring.application.name=dunder-mifflin-backend
server.port=8080
spring.datasource.url=jdbc:h2:mem:dfdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:data.sql
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=Live API
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=Spec (df.yaml)
springdoc.swagger-ui.urls[1].url=/openapi/df.yaml
springdoc.paths-to-match=/api/v1/catalogs/**,/api/v1/inventory/**,/api/v1/dundermifflin/catalogos/**,/api/v1/dundermifflin/inventario/**
springdoc.packages-to-scan=com.dundermifflin.api.web
management.endpoints.web.exposure.include=health,info
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.data.web.pageable.max-page-size=100
